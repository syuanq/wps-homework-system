{% extends "base.html" %}
{% block title %}分层学习任务 - 基于DeepSeek的WPS作业智能批阅与分层推送决策系统{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="text-center mb-4">
        <h3><i class="bi bi-layers"></i> 分层学习任务</h3>
        <p class="text-muted">根据作业评分结果，AI智能生成个性化分层学习任务</p>
    </div>
    
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-3" style="border-radius: 12px; border-top: 4px solid #28a745;">
                <i class="bi bi-star-fill fs-2" style="color: #28a745;"></i>
                <h6 class="mt-2">优秀层</h6>
                <p class="text-muted small mb-0">85-100分<br>拓展挑战任务</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-3" style="border-radius: 12px; border-top: 4px solid #17a2b8;">
                <i class="bi bi-hand-thumbs-up fs-2" style="color: #17a2b8;"></i>
                <h6 class="mt-2">良好层</h6>
                <p class="text-muted small mb-0">70-84分<br>巩固提升任务</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-3" style="border-radius: 12px; border-top: 4px solid #ffc107;">
                <i class="bi bi-exclamation-triangle fs-2" style="color: #ffc107;"></i>
                <h6 class="mt-2">及格层</h6>
                <p class="text-muted small mb-0">60-69分<br>基础强化任务</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-3" style="border-radius: 12px; border-top: 4px solid #dc3545;">
                <i class="bi bi-arrow-down-circle fs-2" style="color: #dc3545;"></i>
                <h6 class="mt-2">基础层</h6>
                <p class="text-muted small mb-0">0-59分<br>入门学习任务</p>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <div class="card border-0 shadow-sm p-4 d-inline-block" style="border-radius: 12px; max-width: 500px;">
            <i class="bi bi-info-circle fs-1 text-primary"></i>
            <h5 class="mt-3">如何获取分层任务？</h5>
            <p class="text-muted">请先提交作业，系统评分后会根据您的成绩自动生成个性化的分层学习任务。</p>
            <a href="/" class="btn btn-primary">
                <i class="bi bi-upload"></i> 去提交作业
            </a>
        </div>
    </div>
</div>
{% endblock %}
